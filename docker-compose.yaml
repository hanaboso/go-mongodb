version: '3.5'

services:
    app:
        image: golang:alpine
        working_dir: /mongodb
        volumes:
            - ./:/mongodb
        environment:
            MONGODB_DSN: mongodb://mongodb/?heartbeatFrequencyMS=10000
        command: /bin/sh -c 'apk add --no-cache git && go get -u golang.org/x/lint/golint && tail -f /dev/null'

    mongodb:
        image: mongo
        ports:
            - ${DEV_IP}:27017:27017
        volumes:
            - mongodb:/data/db

volumes:
    mongodb:
